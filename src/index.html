<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio personal - Dezvoltator Web">
    <title>Portfolio Personal | Nume Prenume</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">NP</div>
            <ul class="nav-menu">
                <li><a href="#home">Acasă</a></li>
                <li><a href="#about">Despre</a></li>
                <li><a href="#projects">Proiecte</a></li>
                <li><a href="#skills">Abilități</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Bună, sunt <span class="highlight">Nume Prenume</span></h1>
                <h2>Dezvoltator Web Full-Stack</h2>
                <p>Creez experiențe web interactive și aplicații moderne</p>
                <div class="cta-buttons">
                    <a href="#projects" class="btn btn-primary">Vezi Proiecte</a>
                    <a href="#contact" class="btn btn-secondary">Contact</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects">
        <div class="container">
            <h2 class="section-title">Proiectele Mele</h2>
            <div class="projects-grid">
                <!-- Projects will be added here -->
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="skills">
        <div class="container">
            <h2 class="section-title">Abilități Tehnice</h2>
            <div class="skills-grid">
                <!-- Skills will be added here -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact">
        <div class="container">
            <h2 class="section-title">Contact</h2>
            <form class="contact-form">
                <input type="text" placeholder="Nume" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Mesaj" rows="5" required></textarea>
                <button type="submit" class="btn btn-primary">Trimite</button>
            </form>
        </div>
    </section>

    <script src="../assets/js/script.js"></script>
</body>
</html>
